<!DOCTYPE html>
<html>
<head><title>FinDoc — Login</title></head>
<body>

<h2>FinDoc</h2>
<p><a href="index.html">Already logged in? Go to dashboard</a></p>
<hr>

<!-- LOGIN -->
<h3>Login</h3>
<input type="text"     id="l_user" placeholder="Username"><br><br>
<input type="password" id="l_pass" placeholder="Password"><br><br>
<button onclick="doLogin()">Login</button>
<p id="login_msg"></p>

<hr>

<!-- REGISTER -->
<h3>Register</h3>
<input type="text"     id="r_user"  placeholder="Username"><br><br>
<input type="email"    id="r_email" placeholder="Email"><br><br>
<input type="password" id="r_pass"  placeholder="Password"><br><br>
<button onclick="doRegister()">Register</button>
<p id="reg_msg"></p>

<script>
  const BASE = "http://127.0.0.1:8000";

  // return to index.html if already logged in 
  if (sessionStorage.getItem("token")) {
    window.location.href = "index.html";
  }

  async function doLogin() {
    const username = document.getElementById("l_user").value;
    const password = document.getElementById("l_pass").value;

    const res  = await fetch(BASE + "/auth/login", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (!res.ok) {
      document.getElementById("login_msg").textContent = "Error: " + data.detail;
      return;
    }

    // Save token — used in every future request as proof of login
    sessionStorage.setItem("token",  data.token);
    sessionStorage.setItem("username", data.username);

    document.getElementById("login_msg").textContent = "Logged in! Redirecting...";
    window.location.href = "index.html";
  }

  async function doRegister() {
    const username = document.getElementById("r_user").value;
    const email    = document.getElementById("r_email").value;
    const password = document.getElementById("r_pass").value;

    const res  = await fetch(BASE + "/auth/register", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ username, email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      document.getElementById("reg_msg").textContent = "Error: " + data.detail;
      return;
    }

    document.getElementById("reg_msg").textContent = "Registered! Now login above.";
  }
</script>

</body>
</html>
